<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Remote Control</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #121212; color: white; text-align: center; }
        a { color: #2ecc71; text-decoration: none; font-weight: bold; }
        .message-box { background: #222; padding: 20px; border-radius: 10px; border: 1px solid #444; }
    </style>
</head>
<body>
    <div class="message-box" id="content">
        <h2>Zpracovávám požadavek...</h2>
    </div>

    <script>
        // Přečte vše, co je v URL za otazníkem (?)
        const queryString = window.location.search.substring(1);

        // Pokud adresa nezačíná "wss://", ukážeme chybovou hlášku
        if (!queryString.startsWith("wss://")) {
            document.getElementById("content").innerHTML = 
                "<h2 style='color: #e74c3c;'>❌ Invalidní token!</h2>" +
                "<p>Přečtěte si prosím návod na stránce:</p>" +
                "<a href='https://github.com/MRredstone667/my-pc-control'>https://github.com/MRredstone667/my-pc-control</a>";
        } else {
            // Pokud je token v pořádku, připojíme se
            const host = queryString;
            const clientId = 'WebControl_' + Math.random().toString(16).substr(2, 8);
            
            const client = mqtt.connect(host, { clientId: clientId });

            client.on('connect', () => {
                // Okamžitě odešle příkaz
                client.publish('pc/power', 'pulse');
                
                // Počká půl sekundy, vyhodí hlášku a zavře okno
                setTimeout(() => {
                    alert('Příkaz byl poslán!');
                    
                    // Bezpečnostní mechanismus prohlížečů může blokovat window.close(),
                    // pokud kartu neotevřel JavaScript. Proto upravíme i text.
                    document.getElementById("content").innerHTML = 
                        "<h2 style='color: #2ecc71;'>✅ Příkaz odeslán</h2><p>Můžete zavřít tuto záložku.</p>";
                    
                    window.close(); // Pokus o zavření karty
                }, 500);
            });

            client.on('error', (err) => {
                document.getElementById("content").innerHTML = "<h2 style='color: #e74c3c;'>❌ Chyba připojení k MQTT</h2>";
            });
        }
    </script>
</body>
</html>
