<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Správa Serveru</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.1.0/paho-mqtt.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 20%; background-color: #121212; color: white; }
        #content { display: none; }
        .doc-message { color: #ff5555; }
    </style>
</head>
<body>

    <div id="docs" class="doc-message">
        <h1>Běž si přečíst dokumentaci.</h1>
        <p>Nemáš zde oprávnění.</p>
    </div>

    <div id="content">
        <h1>Připojování a odesílání příkazu...</h1>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const encodedData = urlParams.get('xyz');

        if (encodedData) {
            try {
                // Rozkódování Base64 dat z URL
                const decodedJson = atob(encodedData);
                const credentials = JSON.parse(decodedJson);

                document.getElementById('docs').style.display = 'none';
                document.getElementById('content').style.display = 'block';

                const mqttHost = credentials.h;
                const mqttPort = 8884; // WebSockets port pro prohlížeč
                const mqttUser = credentials.u;
                const mqttPass = credentials.p;
                const topic = "server/rele/cmd";

                const clientId = "WebClient_" + Math.random().toString(16).substr(2, 8);
                const client = new Paho.Client(mqttHost, mqttPort, "/mqtt", clientId);

                const options = {
                    useSSL: true,
                    userName: mqttUser,
                    password: mqttPass,
                    onSuccess: function() {
                        const message = new Paho.Message("ZAPNI");
                        message.destinationName = topic;
                        client.send(message);

                        alert("Požadavek odeslán!");
                        window.open('', '_self', ''); 
                        window.close();
                    },
                    onFailure: function(err) {
                        alert("Chyba připojení ke cloudu: " + err.errorMessage);
                    }
                };

                client.connect(options);

            } catch (e) {
                console.log("Neplatný formát dat.");
            }
        }
    </script>
</body>
</html>
